<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="">
    <meta name="keywords" content="">
    <title>자바스크립트 시작</title>
    <style>
        h1 {color:red;}
    </style>
    <script>
        // 내부자바스크립트 작성위치-1(head)-데이터 불러오기
    </script>
    <!-- 외부 자바스크립트 작성 -->
    <!-- defer 없이 html 동적 js를 아래 파일에서 작성한다면 에러 남 (읽기전) -->
    <!-- defer 작성시 script위치 무시하고 html 모두 읽은 후 -> script처리 (ok) -->
    <script src="./scripts/start.js" defer></script><!-- h1 (ok)  /  defer 주로 위에 많이 씀  -->
</head>
<body>
    <h1>제목</h1>
    <!-- 기본 HTML 작성위치(script)는 맨 아래에만 배치하기 -->
    <script>
        // 내부자바스크립트 작성위치-2(body)HTML 태그 읽은 후 동적처리
        // h1 (ok)
    </script>
    <script src="./scripts/start.js"></script>
</body>
</html>
